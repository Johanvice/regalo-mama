<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Madre Guerrera ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="overlay">
        <div class="welcome-box">
            <div class="heart-loader"></div>
            <button onclick="comenzar()">Toca con amor, Mamá ❤️</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="contenedor-principal">
        <div id="titulo-superior" class="oculto">
            <h2 class="titulo-feliz-dia">¡Feliz Día Mamá!</h2>
        </div>

        <div class="espacio-flor"></div>

        <div id="mensaje" class="oculto">
            <h1 class="texto-brillante">Mi Gran Tesoro</h1>
            <p class="dedicatoria">
                Mamá, eres el ejemplo más puro de <strong>fuerza y valentía</strong>. Gracias por ser mi refugio y por enseñarme a nunca rendirme. Te quiero más de lo que las palabras pueden expresar; eres el motor de mi vida.
            </p>
            <div class="glow-line"></div>
            <p class="firma">Con todo el amor de tu hijo, <strong>Johan</strong></p>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
