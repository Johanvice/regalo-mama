<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para la mejor Mamá</title>
    <link rel="stylesheet" href="style.css">
    <!-- Cargamos todas las fuentes necesarias -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="overlay">
        <div class="welcome-box">
            <button onclick="comenzar()">Haz clic aquí, Mamá ❤️</button>
            <p style="color: white; margin-top: 15px; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; opacity: 0.6;">(Sube el volumen)</p>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="contenedor-principal">
        
        <!-- Título Superior con el diseño original que te gustó -->
        <div id="titulo-superior" class="oculto">
            <h2 class="titulo-feliz-dia">¡Feliz Día Mamá!</h2>
        </div>

        <div id="flower-svg-container" class="oculto">
            <svg viewBox="0 0 200 200" class="flower-svg">
                <defs>
                    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path class="stem-path" d="M100,200 L100,105" stroke="url(#stemGradient)" stroke-width="4" fill="none" />
                <g id="petals-layer"></g>
                <circle id="centro-rojo" cx="100" cy="100" r="12" fill="#ff0000" />
            </svg>
        </div>

        <!-- Mensaje Nuevo con tipografía profesional y legible -->
        <div id="mensaje" class="oculto">
            <h1 class="texto-brillante">Gracias por ser mi luz</h1>
            <p class="dedicatoria">
                Mamá, aunque el cielo esté lleno de estrellas, ninguna brilla con la fuerza de tu corazón. 
                Gracias por enseñarme que el amor no tiene límites y por ser el refugio donde siempre encuentro paz.
            </p>
            <div class="linea-decorativa"></div>
            <p class="firma">Te amo con toda mi alma</p>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
